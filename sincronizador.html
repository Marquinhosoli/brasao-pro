<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>THOTH PRO - Sincronizador de Base</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    :root {
      --bg-color: #0b1021; --card-bg: #151c33; --primary: #ffb020;
      --primary-hover: #e09919; --success: #23c483; --text-main: #e8eefc;
      --text-muted: #8e9bb0; --border: #2a3654; --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg-color); color: var(--text-main); padding: 20px; }
    .container { max-width: 800px; margin: 0 auto; }
    .header { margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
    .header h1 { font-size: 1.5rem; color: var(--primary); }
    .controls { display: flex; flex-direction: column; gap: 16px; margin-bottom: 24px; background: var(--card-bg); padding: 20px; border-radius: var(--radius); border: 1px solid var(--border); }
    .btn { padding: 12px 24px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; font-size: 1rem; width: 100%; }
    .btn-primary { background: var(--primary); color: #000; }
    .btn-success { background: var(--success); color: #000; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    input[type="file"] { display: none; }
    .file-label { border: 2px dashed var(--text-muted); color: var(--text-main); padding: 15px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; text-align: center; }
    .file-label.loaded { border-color: var(--success); color: var(--success); border-style: solid; }
    .log-container { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; height: 250px; overflow-y: auto; font-family: 'Consolas', monospace; font-size: 0.9rem; color: var(--text-muted); }
    .log-entry { margin-bottom: 4px; padding-bottom: 4px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .highlight { color: #fff; font-weight: bold; }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>🔄 Sincronizador Automático de Base</h1>
    <span style="color: var(--text-muted); font-size: 0.85rem;">Mesclagem inteligente com tabela Demarchi</span>
  </div>

  <div class="controls">
    <label class="file-label" id="lblBase" for="baseInput">📋 1. SELECIONE SUA BASE_PRODUTOS ATUAL</label>
    <input type="file" id="baseInput" accept=".xlsx, .csv" />
    
    <label class="file-label" id="lblDemarchi" for="demarchiInput">🍎 2. SELECIONE A TABELA DA DEMARCHI</label>
    <input type="file" id="demarchiInput" accept=".xlsx, .csv" />
    
    <button class="btn btn-primary" id="btnSincronizar" disabled>⚡ SINCRONIZAR E PREENCHER</button>
    <button class="btn btn-success" id="btnBaixar" style="display: none;">⬇️ BAIXAR NOVA BASE_PRODUTOS</button>
  </div>

  <div class="log-container" id="logArea">
    <div class="log-entry">Aguardando arquivos...</div>
  </div>
</div>

<script>
  let baseData = [];
  let demarchiDict = {};
  let workbookFinal = null;

  function log(msg) {
    const div = document.createElement('div');
    div.className = 'log-entry';
    div.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
    document.getElementById('logArea').appendChild(div);
    document.getElementById('logArea').scrollTop = document.getElementById('logArea').scrollHeight;
  }

  function normalizeText(text) {
    if (!text) return "";
    return text.toString().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-zA-Z0-9 ]/g, " ").replace(/\s+/g, " ").trim().toUpperCase();
  }

  // 1. Carregar Base
  document.getElementById('baseInput').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if(!file) return;
    document.getElementById('lblBase').classList.add('loaded');
    document.getElementById('lblBase').textContent = `✅ BASE CARREGADA: ${file.name}`;
    
    const data = await file.arrayBuffer();
    const wb = XLSX.read(data, { type: 'array' });
    baseData = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval: "" });
    log(`Sua base foi carregada com ${baseData.length} itens.`);
    checkReady();
  });

  // 2. Carregar Demarchi
  document.getElementById('demarchiInput').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if(!file) return;
    document.getElementById('lblDemarchi').classList.add('loaded');
    document.getElementById('lblDemarchi').textContent = `✅ DEMARCHI CARREGADA: ${file.name}`;
    
    const data = await file.arrayBuffer();
    const wb = XLSX.read(data, { type: 'array' });
    const demarchiRows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
    
    // Criar dicionário super rápido para busca
    demarchiRows.forEach(row => {
      const nome = normalizeText(row['Produto'] || row['PRODUTO']);
      const pesoStr = (row['Peso Cxa'] || row['PESO CXA'] || "").toString().toUpperCase();
      if(nome && pesoStr) {
        demarchiDict[nome] = pesoStr;
      }
    });
    log(`Tabela Demarchi carregada com ${Object.keys(demarchiDict).length} itens de referência.`);
    checkReady();
  });

  function checkReady() {
    if(baseData.length > 0 && Object.keys(demarchiDict).length > 0) {
      document.getElementById('btnSincronizar').disabled = false;
    }
  }

  // 3. Processar Mesclagem
  document.getElementById('btnSincronizar').addEventListener('click', () => {
    log("Iniciando cruzamento de dados...");
    let atualizados = 0;

    baseData.forEach(item => {
      const nomeBase = normalizeText(item['produto_base'] || item['produto']);
      let sinonimos = (item['sinonimos'] || "").split(';').map(s => normalizeText(s));
      
      // Verifica se o item tá vazio na base (precisando de preenchimento)
      let pesoAtual = parseFloat(item['peso_caixa']) || 0;
      let bdjAtual = parseFloat(item['bandejas_por_caixa']) || 0;
      let unAtual = parseFloat(item['itens_por_caixa'] || item['unidades_caixa']) || 0;

      if(pesoAtual === 0 && bdjAtual === 0 && unAtual === 0) {
        // Tenta achar na Demarchi pelo nome principal ou sinônimos
        let valorAchado = demarchiDict[nomeBase];
        if(!valorAchado) {
          for(let sin of sinonimos) {
            if(demarchiDict[sin]) { valorAchado = demarchiDict[sin]; break; }
          }
        }

        if(valorAchado) {
          // Extrai o número do gabarito (ex: "4 Bdj" vira 4)
          let numeroExtraido = parseFloat(valorAchado.replace(',', '.').replace(/[^0-9.]/g, ''));
          
          if(!isNaN(numeroExtraido)) {
            if(valorAchado.includes('BDJ') || valorAchado.includes('BANDEJA') || item['tipo'] === 'BDJ' || item['modo_conversao'] === 'BANDEJA') {
              item['bandejas_por_caixa'] = numeroExtraido;
              log(`Atualizado: <span class="highlight">${nomeBase}</span> -> ${numeroExtraido} Bandejas`);
            } else if(item['tipo'] === 'UN' || item['modo_conversao'] === 'UNIDADE') {
              item['itens_por_caixa'] = numeroExtraido;
              log(`Atualizado: <span class="highlight">${nomeBase}</span> -> ${numeroExtraido} Unidades`);
            } else {
              item['peso_caixa'] = numeroExtraido;
              log(`Atualizado: <span class="highlight">${nomeBase}</span> -> ${numeroExtraido} KG`);
            }
            atualizados++;
          }
        }
      }
    });

    log(`<br><b>Sincronização concluída! ${atualizados} produtos preenchidos automaticamente.</b>`);
    
    // Gerar novo arquivo
    workbookFinal = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(workbookFinal, XLSX.utils.json_to_sheet(baseData), "BASE_PRODUTOS");
    
    document.getElementById('btnSincronizar').style.display = 'none';
    document.getElementById('btnBaixar').style.display = 'block';
  });

  // 4. Baixar Nova Base
  document.getElementById('btnBaixar').addEventListener('click', () => {
    XLSX.writeFile(workbookFinal, `BASE_PRODUTOS_ATUALIZADA.xlsx`);
  });
</script>
</body>
</html>
