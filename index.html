<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>THOTH PRO Multi-Cliente</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    :root {
      --bg-color: #0b1021;
      --card-bg: #151c33;
      --primary: #4f8cff;
      --primary-hover: #3a70db;
      --success: #23c483;
      --danger: #ff4d4d;
      --warning: #ffb020;
      --text-main: #e8eefc;
      --text-muted: #8e9bb0;
      --border: #2a3654;
      --radius: 12px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .header h1 {
      font-size: 1.5rem;
      color: var(--primary);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .grid-dashboard {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--card-bg);
      padding: 20px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      text-align: center;
    }

    .stat-card h3 { font-size: 0.9rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px;}
    .stat-card .value { font-size: 2rem; font-weight: bold; }
    .stat-card.success .value { color: var(--success); }
    .stat-card.danger .value { color: var(--danger); }
    .stat-card.primary .value { color: var(--primary); }

    .controls {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 24px;
      background: var(--card-bg);
      padding: 20px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      align-items: center;
    }

    .btn {
      padding: 12px 24px;
      border-radius: 8px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 1rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-success { background: var(--success); color: #000; }
    .btn-success:hover { background: #1da36d; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    input[type="file"] { display: none; }
    .file-label {
      background: transparent;
      border: 2px dashed var(--primary);
      color: var(--primary);
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }
    .file-label:hover { background: rgba(79, 140, 255, 0.1); }

    .log-container {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      height: 300px;
      overflow-y: auto;
      font-family: 'Consolas', monospace;
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .log-entry { margin-bottom: 4px; padding-bottom: 4px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .log-entry.error { color: var(--danger); }
    .log-entry.warn { color: var(--warning); }
    .log-entry.info { color: var(--primary); }

    /* Responsividade avançada para telas menores */
    @media (max-width: 768px) {
      .controls { flex-direction: column; align-items: stretch; }
      .btn { justify-content: center; }
      .file-label { text-align: center; }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>📦 THOTH PRO Multi-Cliente</h1>
    <span style="color: var(--text-muted); font-size: 0.85rem;">Motor de Conversão Inteligente</span>
  </div>

  <div class="grid-dashboard">
    <div class="stat-card primary">
      <h3>Total Lidos</h3>
      <div class="value" id="valTotal">0</div>
    </div>
    <div class="stat-card success">
      <h3>Convertidos</h3>
      <div class="value" id="valConvertidos">0</div>
    </div>
    <div class="stat-card danger">
      <h3>Sem Base</h3>
      <div class="value" id="valSemBase">0</div>
    </div>
  </div>

  <div class="controls">
    <label class="file-label" for="fileInput">📁 SELECIONAR ARQUIVOS (EXCEL)</label>
    <input type="file" id="fileInput" multiple accept=".xlsx, .xls, .csv" />
    <span id="fileCount" style="color: var(--text-muted); flex-grow: 1;">Nenhum arquivo selecionado</span>
    
    <button class="btn btn-primary" id="btnProcessar" disabled>⚙️ PROCESSAR PEDIDOS</button>
    <button class="btn btn-success" id="btnBaixar" style="display: none;">⬇️ BAIXAR EXCEL FINAL</button>
  </div>

  <div class="log-container" id="logArea">
    <div class="log-entry">Sistema inicializado. Base Mestre carregada. Aguardando arquivos...</div>
    <div class="log-entry" style="color: var(--text-muted); opacity: 0.5;">[Módulo PDF/OCR]: Standby.</div>
  </div>
</div>

<script>
  // ==========================================
  // 1. BASE MESTRE - MOTOR DE CONVERSÃO
  // Nenhuma conversão acontece fora desta base.
  // ==========================================
  const BASE_MESTRE_ARRAY = [
    { produto: "LARANJA KINKAN", categoria: "FRUTAS", tipo: "PESO", peso_caixa: 20, sinonimos: ["KINKAN", "LARANJA KINKAN KG", "LARANJA KINKAN BRASAO FRUTA"] },
    { produto: "LARANJA MAQUINA DE SUCO", categoria: "FRUTAS", tipo: "PESO", peso_caixa: 20, sinonimos: ["LARANJA SUCO"] },
    { produto: "LIMAO SICILIANO", categoria: "FRUTAS", tipo: "PESO", peso_caixa: 20, sinonimos: ["LIMAO SICILIANO KG"] },
    { produto: "LIMAO TAHITI", categoria: "FRUTAS", tipo: "PESO", peso_caixa: 20, sinonimos: ["LIMAO TAHITI KG"] },
    { produto: "TOMATE GRAPE", categoria: "LEGUMES", tipo: "BDJ", bandejas_por_caixa: 12, sinonimos: ["TOMATE GRAP", "TOMATE SWEET GRAPE"] },
    { produto: "MELAO GALIA", categoria: "FRUTAS", tipo: "UN", unidades_caixa: 6, sinonimos: ["MELAO GALIA UNIDADE"] }
    // Adicione mais itens conforme a necessidade
  ];

  // Dicionário de busca O(1) ultra-rápido
  const DICIONARIO_PRODUTOS = {};
  BASE_MESTRE_ARRAY.forEach(item => {
    DICIONARIO_PRODUTOS[normalizeText(item.produto)] = item;
    if (item.sinonimos) {
      item.sinonimos.forEach(sin => {
        DICIONARIO_PRODUTOS[normalizeText(sin)] = item;
      });
    }
  });

  // ==========================================
  // 2. VARIÁVEIS GLOBAIS
  // ==========================================
  let arquivosSelecionados = [];
  let workbookFinal = null;

  // Elementos UI
  const elFileInput = document.getElementById('fileInput');
  const elFileCount = document.getElementById('fileCount');
  const btnProcessar = document.getElementById('btnProcessar');
  const btnBaixar = document.getElementById('btnBaixar');
  const logArea = document.getElementById('logArea');

  // ==========================================
  // 3. FUNÇÕES UTILITÁRIAS
  // ==========================================
  function log(msg, type = '') {
    const div = document.createElement('div');
    div.className = `log-entry ${type}`;
    const hora = new Date().toLocaleTimeString();
    div.textContent = `[${hora}] ${msg}`;
    logArea.appendChild(div);
    logArea.scrollTop = logArea.scrollHeight;
  }

  function normalizeText(text) {
    if (!text) return "";
    return text.toString()
      .normalize("NFD").replace(/[\u0300-\u036f]/g, "") // Remove acentos
      .replace(/[^a-zA-Z0-9 ]/g, " ") // Remove caracteres especiais
      .replace(/\s+/g, " ") // Espaços duplos
      .trim().toUpperCase();
  }

  function identificarLoja(nomeArquivo) {
    const nomeNormal = normalizeText(nomeArquivo);
    if (nomeNormal.includes("KRILL")) return "KRILL";
    if (nomeNormal.includes("BRASAO")) return "BRASAO";
    if (nomeNormal.includes("KROSS")) return "KROSS";
    if (nomeNormal.includes("CD")) return "CENTRO DISTRIBUICAO";
    return "LOJA INDEFINIDA";
  }

  // ==========================================
  // 4. LÓGICA DE PROCESSAMENTO (MOTOR)
  // ==========================================
  elFileInput.addEventListener('change', (e) => {
    arquivosSelecionados = Array.from(e.target.files);
    elFileCount.textContent = `${arquivosSelecionados.length} arquivo(s) selecionado(s)`;
    btnProcessar.disabled = arquivosSelecionados.length === 0;
    btnBaixar.style.display = 'none';
    log(`${arquivosSelecionados.length} arquivo(s) na fila para processamento.`, 'info');
  });

  btnProcessar.addEventListener('click', async () => {
    btnProcessar.disabled = true;
    log("Iniciando processamento em lote...", 'info');
    
    let processados = { frutas: [], legumes: [], sem_base: [], consolidado: [] };
    let contadores = { total: 0, sucesso: 0, falha: 0 };

    for (let file of arquivosSelecionados) {
      log(`Lendo arquivo: ${file.name}`);
      const lojaIdentificada = identificarLoja(file.name);
      
      try {
        const data = await file.arrayBuffer();
        const wb = XLSX.read(data, { type: 'array' });
        
        wb.SheetNames.forEach(sheetName => {
          const rows = XLSX.utils.sheet_to_json(wb.Sheets[sheetName], { header: 1 });
          if (rows.length < 2) return;

          // Inteligência de Leitura: Encontrar índices de colunas dinamicamente
          const headers = rows[0].map(h => normalizeText(h));
          let idxProd = headers.findIndex(h => h.includes("PRODUTO") || h.includes("DESCRICAO"));
          let idxQtd = headers.findIndex(h => h.includes("QTD") || h.includes("QUANTIDADE"));
          let idxLoja = headers.findIndex(h => h.includes("LOJA") || h.includes("CLIENTE"));
          
          // Fallback caso não tenha cabeçalho claro (assume padrão: Col A = Prod, Col B = Qtd)
          if (idxProd === -1) idxProd = 0;
          if (idxQtd === -1) idxQtd = 1;

          for (let i = 1; i < rows.length; i++) {
            const row = rows[i];
            const nomeProdutoRaw = row[idxProd];
            const qtdRaw = row[idxQtd];

            if (!nomeProdutoRaw || !qtdRaw) continue; // Ignora linhas vazias

            contadores.total++;
            const nomeNormalizado = normalizeText(nomeProdutoRaw);
            const qtdNum = parseFloat(qtdRaw.toString().replace(',','.'));
            const lojaRow = idxLoja !== -1 && row[idxLoja] ? row[idxLoja] : lojaIdentificada;

            const baseRef = DICIONARIO_PRODUTOS[nomeNormalizado];

            let registro = {
              LOJA: lojaRow,
              PRODUTO_ORIGINAL: nomeProdutoRaw,
              QTD_PEDIDA: qtdNum,
              PRODUTO_BASE: baseRef ? baseRef.produto : "NÃO ENCONTRADO",
              CAIXAS_CONVERTIDAS: 0,
              TIPO: baseRef ? baseRef.tipo : "-",
              CATEGORIA: baseRef ? baseRef.categoria : "-"
            };

            if (baseRef) {
              // REGRA DE CONVERSÃO CRÍTICA - SEMPRE ARREDONDA PARA CIMA
              let caixas = 0;
              if (baseRef.tipo === "PESO" && baseRef.peso_caixa) caixas = Math.ceil(qtdNum / baseRef.peso_caixa);
              else if (baseRef.tipo === "BDJ" && baseRef.bandejas_por_caixa) caixas = Math.ceil(qtdNum / baseRef.bandejas_por_caixa);
              else if (baseRef.tipo === "UN" && baseRef.unidades_caixa) caixas = Math.ceil(qtdNum / baseRef.unidades_caixa);
              else caixas = Math.ceil(qtdNum); // Fallback de segurança se falhar o fator
              
              registro.CAIXAS_CONVERTIDAS = caixas;
              contadores.sucesso++;
              
              processados.consolidado.push(registro);
              if (baseRef.categoria === "FRUTAS") processados.frutas.push(registro);
              if (baseRef.categoria === "LEGUMES") processados.legumes.push(registro);
              
            } else {
              // SEM BASE - Regra estrita de nunca adivinhar
              registro.MOTIVO = "Produto não mapeado na BASE_MESTRE";
              processados.sem_base.push(registro);
              processados.consolidado.push(registro);
              contadores.falha++;
              log(`Sem Base: ${nomeProdutoRaw}`, 'warn');
            }
          }
        });
      } catch (err) {
        log(`Erro ao processar ${file.name}: ${err.message}`, 'error');
      }
    }

    // ==========================================
    // 5. GERAÇÃO DE SAÍDA (EXCEL MULTI-ABA)
    // ==========================================
    workbookFinal = XLSX.utils.book_new();

    // Aba 1: FRUTAS
    XLSX.utils.book_append_sheet(workbookFinal, XLSX.utils.json_to_sheet(processados.frutas), "FRUTAS");
    // Aba 2: LEGUMES
    XLSX.utils.book_append_sheet(workbookFinal, XLSX.utils.json_to_sheet(processados.legumes), "LEGUMES");
    // Aba 3: SEM_BASE
    XLSX.utils.book_append_sheet(workbookFinal, XLSX.utils.json_to_sheet(processados.sem_base), "SEM_BASE");
    
    // Aba 4: CODIGOS_PRECOS (Tudo válido ordenado alfabeticamente)
    let codigosPrecos = [...processados.frutas, ...processados.legumes].sort((a, b) => a.PRODUTO_BASE.localeCompare(b.PRODUTO_BASE));
    XLSX.utils.book_append_sheet(workbookFinal, XLSX.utils.json_to_sheet(codigosPrecos), "CODIGOS_PRECOS");
    
    // Aba 5: CONSOLIDADO
    XLSX.utils.book_append_sheet(workbookFinal, XLSX.utils.json_to_sheet(processados.consolidado), "CONSOLIDADO");
    
    // Aba 6: BASE MESTRE
    XLSX.utils.book_append_sheet(workbookFinal, XLSX.utils.json_to_sheet(BASE_MESTRE_ARRAY), "BASE_MESTRE");

    // Atualiza Painel
    document.getElementById('valTotal').textContent = contadores.total;
    document.getElementById('valConvertidos').textContent = contadores.sucesso;
    document.getElementById('valSemBase').textContent = contadores.falha;

    log(`Processamento concluído. Sucesso: ${contadores.sucesso} | Sem base: ${contadores.falha}`, 'success');
    
    btnProcessar.disabled = false;
    btnBaixar.style.display = 'flex';
  });

  // ==========================================
  // 6. DOWNLOAD DO RESULTADO
  // ==========================================
  btnBaixar.addEventListener('click', () => {
    if (!workbookFinal) return;
    const dataAtual = new Date().toISOString().split('T')[0];
    XLSX.writeFile(workbookFinal, `THOTH_PRO_RESULTADO_${dataAtual}.xlsx`);
    log('Arquivo Excel exportado com sucesso.', 'info');
  });

</script>
</body>
</html>
